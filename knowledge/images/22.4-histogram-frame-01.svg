<svg xmlns="http://www.w3.org/2000/svg" width="900" height="430" viewBox="0 0 900 430">
  <rect width="900" height="430" fill="#ffffff"/>
  <text x="450" y="36" text-anchor="middle" font-size="24" font-family="Microsoft YaHei, SimHei, Arial">第1步 先搭坐标轴</text>
  <text x="450" y="68" text-anchor="middle" font-size="16" fill="#555" font-family="Microsoft YaHei, SimHei, Arial">横轴写用电量区间，纵轴标频数</text>
  <line x1="110" y1="330" x2="815" y2="330" stroke="#222" stroke-width="2"/>
  <line x1="110" y1="330" x2="110" y2="90" stroke="#222" stroke-width="2"/>
  <text x="82" y="335" font-size="16" font-family="Arial">0</text>
  <text x="82" y="255" font-size="16" font-family="Arial">5</text>
  <text x="74" y="175" font-size="16" font-family="Arial">10</text>
  <text x="74" y="95" font-size="16" font-family="Arial">15</text>
  <line x1="105" y1="250" x2="115" y2="250" stroke="#222"/>
  <line x1="105" y1="170" x2="115" y2="170" stroke="#222"/>
  <line x1="105" y1="90" x2="115" y2="90" stroke="#222"/>
  <text x="58" y="82" font-size="18" font-family="Microsoft YaHei, SimHei, Arial">频数</text>
  <text x="380" y="392" font-size="18" font-family="Microsoft YaHei, SimHei, Arial">全年月平均用电量 x / 千瓦·时</text>
  <text x="150" y="356" font-size="13" font-family="Arial">100≤x&lt;120</text>
  <text x="240" y="356" font-size="13" font-family="Arial">120≤x&lt;140</text>
  <text x="330" y="356" font-size="13" font-family="Arial">140≤x&lt;160</text>
  <text x="420" y="356" font-size="13" font-family="Arial">160≤x&lt;180</text>
  <text x="510" y="356" font-size="13" font-family="Arial">180≤x&lt;200</text>
  <text x="600" y="356" font-size="13" font-family="Arial">200≤x&lt;220</text>
</svg>

