  text_snippet: 6. 佳佳水果店在批发市场购买某种水果, 第一次用 1200 元购买了若干千克, 并以 8 元/千克的价格出售, 很快售完。由于畅销,
    第二次购买该水果时, 每千克的进价比第一次提高了 $10\%$ , 用 1452 元所购买的水果比第一次购买的多 $20 \mathrm{~kg}$ , 以
    9 元/千克的价格售出 $100 \mathrm{~kg}$ 后, 因出现高温天气, 水果不易保鲜, 为减少损失, 便降价 $50 \%$ 售完剩余水果。  (1)求第一次购买水果的进价.  (2)该水果店在这两次销售中,
    总体上是盈利还是亏损? 盈利或亏损了多少元?
