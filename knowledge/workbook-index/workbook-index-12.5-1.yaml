  text_snippet: '5. 某区计划进行一项工程施工, 从甲、乙两支工程队的报价单中得知: 甲工程队每施工一天的工程款为 1.1 万元, 乙工程队每施工一天的工程款为
    0.8 万元. 经过对甲、乙两支工程队报价单的测算, 工程小组设计出以下三种施工方案.  方案 A: 由甲工程队单独完成这项工程, 刚好如期完成.  方案
    B: 由乙工程队单独完成这项工程，要比规定时间多 5 天。  方案 C: * * *。剩下'
