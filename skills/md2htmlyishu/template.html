<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{TITLE}}</title>
<script>
  MathJax = {
    tex: { inlineMath: [['$', '$'], ['\\(', '\\)']] },
    startup: { typeset: true }
  };
</script>
<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js" async></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700;900&display=swap');

  :root {
    --bg: #FDF6E3;
    --ink: #1a1a2e;
    --red: #C62828;
    --blue: #1565C0;
    --yellow: #FFEB3B;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #d4ccb8;
    font-family: 'Noto Serif SC', 'Kaiti SC', 'KaiTi', 'STKaiti', serif;
    color: var(--ink);
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
    gap: 30px;
  }

  /* ===== 1920×1080 页面 ===== */
  .slide {
    width: 1920px;
    height: 1080px;
    background: var(--bg);
    padding: 70px 100px;
    position: relative;
    overflow: hidden;
    flex-shrink: 0;
  }

  /* ===== 手写体 ===== */
  .hw {
    font-family: 'Noto Serif SC', 'Kaiti SC', 'KaiTi', 'STKaiti', serif;
    letter-spacing: 0.5px;
  }

  .hw-bold {
    font-family: 'Noto Serif SC', 'Kaiti SC', 'KaiTi', 'STKaiti', serif;
    font-weight: 700;
    letter-spacing: 0.5px;
  }

  .hw-red {
    font-family: 'Noto Serif SC', 'Kaiti SC', 'KaiTi', 'STKaiti', serif;
    color: var(--red);
    font-weight: 700;
    letter-spacing: 0.5px;
  }

  .hw-blue {
    font-family: 'Noto Serif SC', 'Kaiti SC', 'KaiTi', 'STKaiti', serif;
    color: var(--blue);
    letter-spacing: 0.5px;
  }

  /* ===== 荧光笔 ===== */
  .hl {
    background: linear-gradient(180deg, transparent 60%, var(--yellow) 60%, var(--yellow) 90%, transparent 90%);
    padding: 0 2px;
  }

  /* ===== 标题 ===== */
  .title {
    font-family: 'Noto Serif SC', 'Kaiti SC', 'KaiTi', 'STKaiti', serif;
    font-size: 64px;
    font-weight: 900;
    color: var(--ink);
    display: inline-block;
    position: relative;
    padding: 4px 18px;
    margin-bottom: 50px;
    line-height: 1.2;
  }

  .title::after {
    content: '';
    position: absolute;
    left: 0; right: 0;
    bottom: 4px;
    height: 0.5em;
    background: var(--yellow);
    opacity: 0.5;
    z-index: -1;
    transform: rotate(-0.5deg);
    border-radius: 2px;
  }

  /* ===== 正文 ===== */
  .body-text {
    font-size: 30px;
    line-height: 2.0;
  }

  .body-text p { margin-bottom: 14px; }

  .indent { padding-left: 50px; }

  /* ===== 表格 ===== */
  .sketch-table {
    margin: 24px auto;
    border-collapse: collapse;
    font-size: 26px;
  }

  .sketch-table th, .sketch-table td {
    border: 2.5px solid var(--ink);
    padding: 10px 32px;
    text-align: center;
    font-family: 'Noto Serif SC', 'Kaiti SC', 'KaiTi', serif;
  }

  .sketch-table th {
    font-weight: 700;
    border-bottom-width: 3px;
  }

  /* ===== 箭头 ===== */
  .arrow {
    display: inline-block;
    font-size: 36px;
    color: var(--blue);
    margin: 0 12px;
  }

  /* ===== 红笔结论 ===== */
  .conclusion {
    margin-top: 40px;
    padding: 20px 36px;
    border: 3px solid var(--red);
    border-radius: 4px;
    display: inline-block;
  }

  .conclusion .hw-red {
    font-size: 32px;
    line-height: 1.8;
  }

  /* ===== 来源标注 ===== */
  .source {
    position: absolute;
    bottom: 28px;
    right: 40px;
    font-size: 20px;
    color: #a0906c;
    font-family: 'Noto Serif SC', serif;
  }

  .source::before {
    content: '● ';
    color: var(--red);
  }

  /* ===== 页码 ===== */
  .pagenum {
    position: absolute;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 20px;
    color: #b0a080;
  }

  /* ===== 浮动导航圆点（右下角，投屏时可隐藏） ===== */
  .nav-dots {
    position: fixed;
    bottom: 20px;
    right: 20px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    z-index: 9999;
    max-height: 60vh;
    overflow-y: auto;
    padding: 8px;
    background: rgba(253, 246, 227, 0.9);
    border-radius: 20px;
    border: 1.5px solid #d4c9a8;
  }

  .nav-dots button {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    border: 1.5px solid #a0906c;
    background: transparent;
    cursor: pointer;
    padding: 0;
    transition: all 0.2s;
  }

  .nav-dots button:hover {
    background: #a0906c;
    transform: scale(1.2);
  }

  .nav-dots button.active {
    background: var(--ink);
    border-color: var(--ink);
    transform: scale(1.3);
  }

  /* 投屏时隐藏 */
  @media print {
    .nav-dots { display: none; }
  }

  /* ===== 对比布局 ===== */
  .vs-row {
    display: flex;
    gap: 80px;
    margin: 30px 0;
  }

  .vs-col { flex: 1; }

  .vs-col .vs-title {
    font-size: 38px;
    font-weight: 700;
    margin-bottom: 20px;
    padding-bottom: 10px;
    border-bottom: 3px solid var(--ink);
  }

  .vs-col .vs-body {
    font-size: 28px;
    line-height: 2.1;
  }

  /* ===== 数据行 ===== */
  .data-line {
    text-align: center;
    font-size: 26px;
    letter-spacing: 3px;
    margin: 24px 0;
    padding: 12px 0;
    word-spacing: 6px;
  }

  /* ===== 图片 ===== */
  .slide img {
    max-width: 100%;
    max-height: 500px;
    display: block;
    margin: 20px auto;
  }

  @media print {
    body { background: white; }
    .slide { box-shadow: none; page-break-after: always; }
    .nav { display: none; }
  }
</style>
</head>
<body>

{{SLIDES}}

<script>
  function fitSlides() {
    const slides = document.querySelectorAll('.slide');
    const scale = Math.min(window.innerWidth / 1920, 1);
    slides.forEach(s => {
      s.style.transform = `scale(${scale})`;
      s.style.marginBottom = `${1080 * (scale - 1)}px`;
    });
  }

  function show(i) {
    document.querySelectorAll('.slide').forEach((s, idx) => {
      s.style.display = idx === i ? 'block' : 'none';
    });
    document.querySelectorAll('.nav-dots button').forEach((b, idx) => {
      b.classList.toggle('active', idx === i);
    });
    // 滚动到当前圆点可见位置
    const activeBtn = document.querySelector('.nav-dots button.active');
    if (activeBtn) {
      activeBtn.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
    }
  }

  // 键盘/翻页笔支持
  let currentSlide = 0;
  const totalSlides = document.querySelectorAll('.slide').length;

  function goToSlide(i) {
    if (i >= 0 && i < totalSlides) {
      currentSlide = i;
      show(i);
    }
  }

  function nextSlide() {
    goToSlide(currentSlide + 1);
  }

  function prevSlide() {
    goToSlide(currentSlide - 1);
  }

  document.addEventListener('keydown', function(e) {
    // 翻页笔常见按键：空格、PageDown、右箭头、下箭头、Enter
    if (e.key === ' ' || e.key === 'PageDown' || e.key === 'ArrowRight' || e.key === 'ArrowDown' || e.key === 'Enter') {
      e.preventDefault();
      nextSlide();
    }
    // 翻页笔后退：PageUp、左箭头、上箭头、Backspace
    if (e.key === 'PageUp' || e.key === 'ArrowLeft' || e.key === 'ArrowUp' || e.key === 'Backspace') {
      e.preventDefault();
      prevSlide();
    }
    // Home 回第一页
    if (e.key === 'Home') {
      e.preventDefault();
      goToSlide(0);
    }
    // End 到最后一页
    if (e.key === 'End') {
      e.preventDefault();
      goToSlide(totalSlides - 1);
    }
  });

  // 点击页面任意位置也可以翻页（模拟翻页笔单击）
  document.addEventListener('click', function(e) {
    // 点击导航圆点时不触发翻页
    if (e.target.closest('.nav-dots')) return;
    // 有选中文字时不翻页（避免复制时误触）
    if (window.getSelection().toString()) return;
    nextSlide();
  });

  // 右键返回上一页（模拟翻页笔长按或功能键）
  document.addEventListener('contextmenu', function(e) {
    e.preventDefault();
    prevSlide();
  });

  window.addEventListener('resize', fitSlides);
  fitSlides();
</script>

</body>
</html>
